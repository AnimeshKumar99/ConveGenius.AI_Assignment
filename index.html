<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fraction Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <h1>Interactive Fraction Game</h1>
        <button id="start-btn">Start Game</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div class="header">
            <div class="score-board">
                <p>Level: <span id="current-level">1</span></p>
                <p>Score: <span id="current-score">0</span></p>
                <p>Time: <span id="timer-value">30</span>s</p>
            </div>
            
            <div class="fraction-display">
                <div class="fraction-box">
                    <h3>Target Fraction</h3>
                    <div class="fraction">
                        <span id="target-num">2</span>
                        <div class="fraction-line"></div>
                        <span id="target-den">6</span>
                    </div>
                </div>
                
                <div class="fraction-box">
                    <h3>Current Fraction</h3>
                    <div class="fraction">
                        <span id="current-num">0</span>
                        <div class="fraction-line"></div>
                        <span id="current-den">6</span>
                    </div>
                </div>
            </div>
            
            <div class="message" id="message" role="status" aria-live="polite"></div>
        </div>

        <div class="fraction-container">
            <div id="fraction-circle" class="circle">
                <!-- Slices will be dynamically generated by JS -->
            </div>
        </div>

        <div class="controls">
            <button id="add-btn">Add Piece</button>
            <button id="remove-btn">Remove Piece</button>
            <button id="reset-btn">Reset</button>
            <button id="submit-btn">Submit</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
